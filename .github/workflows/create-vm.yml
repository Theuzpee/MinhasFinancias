name: Create Oracle Cloud VM

on:
  schedule:
    - cron: '*/10 * * * *'  # tenta a cada 10 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OCI CLI
        run: |
          pip install oci-cli --quiet

      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/oci_api_key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=sa-saopaulo-1
          EOF

      - name: Get Ubuntu ARM image
        id: image
        run: |
          IMAGE_ID=$(oci compute image list \
            --compartment-id ${{ secrets.OCI_TENANCY_OCID }} \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --query 'data[0].id' \
            --raw-output)
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT

      - name: Get Availability Domain
        id: ad
        run: |
          AD=$(oci iam availability-domain list \
            --compartment-id ${{ secrets.OCI_TENANCY_OCID }} \
            --query 'data[0].name' \
            --raw-output)
          echo "ad=$AD" >> $GITHUB_OUTPUT

      - name: Try to create VM
        id: create
        run: |
          echo '${{ secrets.OCI_SSH_PUBLIC_KEY }}' > /tmp/ssh_key.pub

          cat > /tmp/shape_config.json << 'EOF'
          {"ocpus": 4, "memoryInGBs": 24}
          EOF

          OUTPUT=$(oci compute instance launch \
            --compartment-id ${{ secrets.OCI_TENANCY_OCID }} \
            --availability-domain "${{ steps.ad.outputs.ad }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file:///tmp/shape_config.json \
            --subnet-id ${{ secrets.OCI_SUBNET_OCID }} \
            --image-id "${{ steps.image.outputs.image_id }}" \
            --display-name "n8n-server" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --assign-public-ip true 2>&1) && SUCCESS=true || SUCCESS=false

          if $SUCCESS; then
            PUBLIC_IP=$(echo "$OUTPUT" | python3 -c "
          import sys, json, time
          data = json.load(sys.stdin)
          print(data['data']['id'])
          " 2>/dev/null || echo "")
            echo "success=true" >> $GITHUB_OUTPUT
            echo "instance_output=$OUTPUT" >> $GITHUB_OUTPUT
          else
            if echo "$OUTPUT" | grep -q -i "capacity\|host capacity"; then
              echo "success=false" >> $GITHUB_OUTPUT
              echo "Out of capacity — will retry in 10 minutes"
              exit 0
            else
              echo "Unexpected error:"
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Disable workflow after success
        if: steps.create.outputs.success == 'true'
        run: |
          echo "✅ VM criada com sucesso!"
          echo "${{ steps.create.outputs.instance_output }}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('Instance ID:', data['data']['id'])
          print('State:', data['data']['lifecycle-state'])
          " 2>/dev/null || true
          # Desabilita o workflow para parar as tentativas
          gh api \
            --method PUT \
            repos/${{ github.repository }}/actions/workflows/create-vm.yml/disable \
            || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
