name: Create Oracle Cloud VM

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: secrets
    env:
      SUPPRESS_LABEL_WARNING: "true"
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

    steps:
      - name: Setup OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI credentials
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY"    >  ~/.oci/oci_api_key.pem
          echo "OCI_API_KEY"         >> ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "[DEFAULT]"                                      >  ~/.oci/config
          echo "user=$OCI_USER_OCID"                            >> ~/.oci/config
          echo "fingerprint=$OCI_FINGERPRINT"                   >> ~/.oci/config
          echo "key_file=/home/runner/.oci/oci_api_key.pem"     >> ~/.oci/config
          echo "tenancy=$OCI_TENANCY_OCID"                      >> ~/.oci/config
          echo "region=sa-saopaulo-1"                           >> ~/.oci/config
          chmod 600 ~/.oci/config
          echo "==> Config preview (masked):"
          echo "user length:    ${#OCI_USER_OCID}"
          echo "tenancy length: ${#OCI_TENANCY_OCID}"
          echo "fingerprint:    $OCI_FINGERPRINT"
          echo "==> Testing auth..."
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True oci iam region list --output table

      - name: Get Ubuntu 22.04 ARM image and Availability Domain
        id: info
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --query 'data[0].id' \
            --raw-output)

          AD=$(oci iam availability-domain list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[0].name' \
            --raw-output)

          echo "image_id=$IMAGE_ID" >> "$GITHUB_OUTPUT"
          echo "ad=$AD"             >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE_ID"
          echo "AD:    $AD"

      - name: Try to create VM
        id: create
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          echo "$OCI_SSH_PUBLIC_KEY" > /tmp/ssh_key.pub
          echo '{"ocpus": 4, "memoryInGBs": 24}' > /tmp/shape_config.json

          OUTPUT=$(oci compute instance launch \
            --compartment-id "$OCI_TENANCY_OCID" \
            --availability-domain "${{ steps.info.outputs.ad }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config "file:///tmp/shape_config.json" \
            --subnet-id "$OCI_SUBNET_OCID" \
            --image-id "${{ steps.info.outputs.image_id }}" \
            --display-name "n8n-server" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --assign-public-ip true 2>&1) && SUCCESS=true || SUCCESS=false

          if $SUCCESS; then
            INSTANCE_ID=$(echo "$OUTPUT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")
            echo "success=true"           >> "$GITHUB_OUTPUT"
            echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
            echo "VM criada! Instance ID: $INSTANCE_ID"
          else
            if echo "$OUTPUT" | grep -qi "capacity"; then
              echo "success=false" >> "$GITHUB_OUTPUT"
              echo "Sem capacidade - tentando novamente em 10 minutos"
              exit 0
            else
              echo "Erro inesperado:"
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Disable workflow after success
        if: steps.create.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            "repos/${{ github.repository }}/actions/workflows/create-vm.yml/disable" || true
          echo "Workflow desabilitado. VM no ar!"
